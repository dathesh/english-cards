<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Cards for Kids</title>

  <style>
    /*
      ==========================================
      БАЗОВЫЕ СТИЛИ СТРАНИЦЫ
      ==========================================
      Здесь настраивается общий внешний вид приложения:
      фон, шрифт, расположение карточки по центру экрана.
    */

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef5ff, #fff7e8);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    /*
      Главный контейнер приложения.
      Внутри него находятся кнопки уроков, карточка и кнопки управления.
    */
    .app {
      width: 100%;
      max-width: 820px;
      background: white;
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 30px;
    }

    /*
      Блок с кнопками выбора урока.
      Например: 1, 2, 3, 4...
    */
    .lesson-picker {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .lesson-btn {
      background: #eef2ff;
      color: #1e293b;
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 700;
    }

    .lesson-btn.active {
      background: #2563eb;
      color: white;
    }

    /*
      Текст прогресса: название урока и номер карточки.
      Например: Lesson 1 · Animals & Food · 2/5
    */
    .progress {
      font-size: 18px;
      color: #64748b;
      margin-bottom: 10px;
    }

    /*
      Область одной карточки.
    */
    .card {
      border-radius: 24px;
      background: #f8fafc;
      padding: 24px;
      min-height: 480px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /*
      Английское слово.
    */
    .word {
      font-size: clamp(52px, 10vw, 96px);
      font-weight: 900;
      letter-spacing: 2px;
      margin: 8px 0 14px;
      color: #111827;
    }

    /*
      Русский перевод.
      Его можно оставить или позже скрыть, если он будет мешать обучению.
    */
    .translation {
      font-size: 24px;
      color: #64748b;
      margin-bottom: 12px;
    }

    /*
      Картинка карточки.
      Если файла картинки нет, вместо неё будет показан emoji.
    */
    .image {
      width: min(320px, 80vw);
      height: 260px;
      object-fit: contain;
      margin: 8px auto 16px;
      display: block;
    }

    /*
      Запасной вариант картинки — большой emoji.
      Он появляется, если файл изображения не найден.
    */
    .placeholder {
      width: min(320px, 80vw);
      height: 260px;
      border-radius: 22px;
      background: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 90px;
      margin: 8px auto 16px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 15px 20px;
      font-size: 19px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      font-weight: 700;
    }

    button:hover {
      transform: scale(1.04);
    }

    button:active {
      transform: scale(0.98);
    }

    .show {
      background: #7c3aed;
      color: white;
    }

    .play {
      background: #16a34a;
      color: white;
    }

    .next {
      background: #2563eb;
      color: white;
    }

    .prev {
      background: #f59e0b;
      color: white;
    }

    .reset {
      background: #e2e8f0;
      color: #0f172a;
    }

    /*
      Класс hidden скрывает элемент, но оставляет место под него.
      Это удобно, чтобы карточка не прыгала по экрану.
    */
    .hidden {
      visibility: hidden;
    }

    .hint {
      margin-top: 14px;
      font-size: 15px;
      color: #64748b;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div class="app">
    <h1>English Cards</h1>

    <!--
      Сюда JavaScript автоматически добавит кнопки уроков.
      Например: 1, 2, 3, 4...
    -->
    <div id="lessonPicker" class="lesson-picker"></div>

    <!--
      Здесь показывается текущий урок и номер карточки.
    -->
    <div id="progress" class="progress"></div>

    <div class="card">
      <!-- Английское слово -->
      <div id="word" class="word hidden"></div>

      <!-- Русский перевод -->
      <div id="translation" class="translation hidden"></div>

      <!-- Картинка карточки -->
      <img
        id="image"
        class="image hidden"
        src=""
        alt="card image"
        onerror="showEmojiFallback()"
      />

      <!-- Emoji-заглушка, если картинка не загрузилась -->
      <div id="emojiFallback" class="placeholder hidden"></div>

      <!-- Аудио-файл с произношением -->
      <audio id="audio"></audio>

      <!--
        Основные кнопки обучения:
        1. Показать слово
        2. Включить звук
        3. Показать картинку
      -->
      <div class="buttons">
        <button class="show" onclick="showWord()">1 · Word</button>
        <button class="play" onclick="playAudio()">2 · Sound</button>
        <button class="show" onclick="showImage()">3 · Picture</button>
        <button class="reset" onclick="resetCard()">Hide</button>
      </div>

      <!-- Кнопки перехода между карточками -->
      <div class="buttons">
        <button class="prev" onclick="prevCard()">⬅ Previous</button>
        <button class="next" onclick="nextCard()">Next ➡</button>
      </div>
    </div>

    <div class="hint">
      Клавиши: 1 — слово, 2 — звук, 3 — картинка, ←/→ — карточки, 0 — скрыть.
    </div>
  </div>

  <script>
    /*
      ==========================================
      ДАННЫЕ КАРТОЧЕК
      ==========================================

      Здесь хранятся все уроки и карточки.

      Структура такая:

      lessons = [
        {
          title: 'Название урока',
          cards: [
            {
              word: 'CAT',                // английское слово
              ru: 'кот',                  // русский перевод
              emoji: '🐱',                // запасная картинка, если png не найден
              image: 'images/cat.png',    // путь к картинке
              audio: 'sounds/cat.mp3'     // путь к звуку
            }
          ]
        }
      ];

      Чтобы добавить новую карточку:
      1. Добавь объект в нужный урок.
      2. Положи картинку в папку images.
      3. Положи звук в папку sounds.
      4. Проверь, что имена файлов совпадают с image/audio.
    */

    const lessons = [
      {
        title: 'Lesson 1 · Animals & Food',
        cards: [
          { word: 'CAT', ru: 'кот', emoji: '🐱', image: 'images/cat.png', audio: 'sounds/cat.mp3' },
          { word: 'DOG', ru: 'собака', emoji: '🐶', image: 'images/dog.png', audio: 'sounds/dog.mp3' },
          { word: 'BIRD', ru: 'птица', emoji: '🐦', image: 'images/bird.png', audio: 'sounds/bird.mp3' },
          { word: 'APPLE', ru: 'яблоко', emoji: '🍎', image: 'images/apple.png', audio: 'sounds/apple.mp3' },
          { word: 'BALL', ru: 'мяч', emoji: '⚽', image: 'images/ball.png', audio: 'sounds/ball.mp3' }
        ]
      },
      {
        title: 'Lesson 2 · Toys & Home',
        cards: [
          { word: 'CAR', ru: 'машина', emoji: '🚗', image: 'images/car.png', audio: 'sounds/car.mp3' },
          { word: 'BOOK', ru: 'книга', emoji: '📚', image: 'images/book.png', audio: 'sounds/book.mp3' },
          { word: 'TEDDY', ru: 'мишка', emoji: '🧸', image: 'images/teddy.png', audio: 'sounds/teddy.mp3' },
          { word: 'DOLL', ru: 'кукла', emoji: '🪆', image: 'images/doll.png', audio: 'sounds/doll.mp3' },
          { word: 'TRAIN', ru: 'поезд', emoji: '🚂', image: 'images/train.png', audio: 'sounds/train.mp3' }
        ]
      },
      {
        title: 'Lesson 3 · Colors',
        cards: [
          { word: 'RED', ru: 'красный', emoji: '🔴', image: 'images/red.png', audio: 'sounds/red.mp3' },
          { word: 'BLUE', ru: 'синий', emoji: '🔵', image: 'images/blue.png', audio: 'sounds/blue.mp3' },
          { word: 'GREEN', ru: 'зелёный', emoji: '🟢', image: 'images/green.png', audio: 'sounds/green.mp3' },
          { word: 'YELLOW', ru: 'жёлтый', emoji: '🟡', image: 'images/yellow.png', audio: 'sounds/yellow.mp3' },
          { word: 'BLACK', ru: 'чёрный', emoji: '⚫', image: 'images/black.png', audio: 'sounds/black.mp3' }
        ]
      },
      {
        title: 'Lesson 4 · Family',
        cards: [
          { word: 'MOM', ru: 'мама', emoji: '👩', image: 'images/mom.png', audio: 'sounds/mom.mp3' },
          { word: 'DAD', ru: 'папа', emoji: '👨', image: 'images/dad.png', audio: 'sounds/dad.mp3' },
          { word: 'BABY', ru: 'малыш', emoji: '👶', image: 'images/baby.png', audio: 'sounds/baby.mp3' },
          { word: 'SISTER', ru: 'сестра', emoji: '👧', image: 'images/sister.png', audio: 'sounds/sister.mp3' },
          { word: 'BROTHER', ru: 'брат', emoji: '👦', image: 'images/brother.png', audio: 'sounds/brother.mp3' }
        ]
      },
      {
        title: 'Lesson 5 · Actions',
        cards: [
          { word: 'RUN', ru: 'бежать', emoji: '🏃', image: 'images/run.png', audio: 'sounds/run.mp3' },
          { word: 'JUMP', ru: 'прыгать', emoji: '🦘', image: 'images/jump.png', audio: 'sounds/jump.mp3' },
          { word: 'CLAP', ru: 'хлопать', emoji: '👏', image: 'images/clap.png', audio: 'sounds/clap.mp3' },
          { word: 'SIT', ru: 'сидеть', emoji: '🪑', image: 'images/sit.png', audio: 'sounds/sit.mp3' },
          { word: 'STAND', ru: 'стоять', emoji: '🧍', image: 'images/stand.png', audio: 'sounds/stand.mp3' }
        ]
      },
      {
        title: 'Lesson 6 · Body',
        cards: [
          { word: 'HEAD', ru: 'голова', emoji: '🙂', image: 'images/head.png', audio: 'sounds/head.mp3' },
          { word: 'HAND', ru: 'рука', emoji: '✋', image: 'images/hand.png', audio: 'sounds/hand.mp3' },
          { word: 'LEG', ru: 'нога', emoji: '🦵', image: 'images/leg.png', audio: 'sounds/leg.mp3' },
          { word: 'EYE', ru: 'глаз', emoji: '👁️', image: 'images/eye.png', audio: 'sounds/eye.mp3' },
          { word: 'NOSE', ru: 'нос', emoji: '👃', image: 'images/nose.png', audio: 'sounds/nose.mp3' }
        ]
      },
      {
        title: 'Lesson 7 · Drinks & Snacks',
        cards: [
          { word: 'MILK', ru: 'молоко', emoji: '🥛', image: 'images/milk.png', audio: 'sounds/milk.mp3' },
          { word: 'WATER', ru: 'вода', emoji: '💧', image: 'images/water.png', audio: 'sounds/water.mp3' },
          { word: 'JUICE', ru: 'сок', emoji: '🧃', image: 'images/juice.png', audio: 'sounds/juice.mp3' },
          { word: 'BREAD', ru: 'хлеб', emoji: '🍞', image: 'images/bread.png', audio: 'sounds/bread.mp3' },
          { word: 'CAKE', ru: 'торт', emoji: '🍰', image: 'images/cake.png', audio: 'sounds/cake.mp3' }
        ]
      },
      {
        title: 'Lesson 8 · Nature',
        cards: [
          { word: 'SUN', ru: 'солнце', emoji: '☀️', image: 'images/sun.png', audio: 'sounds/sun.mp3' },
          { word: 'MOON', ru: 'луна', emoji: '🌙', image: 'images/moon.png', audio: 'sounds/moon.mp3' },
          { word: 'STAR', ru: 'звезда', emoji: '⭐', image: 'images/star.png', audio: 'sounds/star.mp3' },
          { word: 'TREE', ru: 'дерево', emoji: '🌳', image: 'images/tree.png', audio: 'sounds/tree.mp3' },
          { word: 'FLOWER', ru: 'цветок', emoji: '🌸', image: 'images/flower.png', audio: 'sounds/flower.mp3' }
        ]
      },
      {
        title: 'Lesson 9 · Classroom',
        cards: [
          { word: 'PEN', ru: 'ручка', emoji: '🖊️', image: 'images/pen.png', audio: 'sounds/pen.mp3' },
          { word: 'PENCIL', ru: 'карандаш', emoji: '✏️', image: 'images/pencil.png', audio: 'sounds/pencil.mp3' },
          { word: 'BAG', ru: 'сумка', emoji: '🎒', image: 'images/bag.png', audio: 'sounds/bag.mp3' },
          { word: 'DESK', ru: 'парта', emoji: '🧑‍💻', image: 'images/desk.png', audio: 'sounds/desk.mp3' },
          { word: 'CHAIR', ru: 'стул', emoji: '🪑', image: 'images/chair.png', audio: 'sounds/chair.mp3' }
        ]
      },
      {
        title: 'Lesson 10 · Greetings',
        cards: [
          { word: 'HELLO', ru: 'привет', emoji: '👋', image: 'images/hello.png', audio: 'sounds/hello.mp3' },
          { word: 'BYE-BYE', ru: 'пока', emoji: '👋', image: 'images/bye-bye.png', audio: 'sounds/bye-bye.mp3' },
          { word: 'YES', ru: 'да', emoji: '✅', image: 'images/yes.png', audio: 'sounds/yes.mp3' },
          { word: 'NO', ru: 'нет', emoji: '❌', image: 'images/no.png', audio: 'sounds/no.mp3' },
          { word: 'THANK YOU', ru: 'спасибо', emoji: '🙏', image: 'images/thank-you.png', audio: 'sounds/thank-you.mp3' }
        ]
      }
    ];

    /*
      ==========================================
      ТЕКУЩЕЕ СОСТОЯНИЕ ПРИЛОЖЕНИЯ
      ==========================================
    */

    // Индекс текущего урока. 0 = первый урок.
    let currentLesson = 0;

    // Индекс текущей карточки внутри урока. 0 = первая карточка.
    let currentCard = 0;

    // Флаг: не удалось ли загрузить картинку.
    // Если картинка не загрузилась, показываем emoji.
    let imageFailed = false;

    /*
      ==========================================
      ССЫЛКИ НА HTML-ЭЛЕМЕНТЫ
      ==========================================
      Получаем элементы страницы, чтобы потом менять их через JavaScript.
    */

    const lessonPickerEl = document.getElementById('lessonPicker');
    const progressEl = document.getElementById('progress');
    const wordEl = document.getElementById('word');
    const translationEl = document.getElementById('translation');
    const imageEl = document.getElementById('image');
    const emojiFallbackEl = document.getElementById('emojiFallback');
    const audioEl = document.getElementById('audio');

    /*
      Получить список карточек текущего урока.
    */
    function getCards() {
      return lessons[currentLesson].cards;
    }

    /*
      Получить текущую карточку.
    */
    function getCard() {
      return getCards()[currentCard];
    }

    /*
      ==========================================
      КНОПКИ УРОКОВ
      ==========================================
      Эта функция создаёт кнопки 1, 2, 3... для выбора урока.
    */
    function renderLessonButtons() {
      lessonPickerEl.innerHTML = '';

      lessons.forEach((lesson, index) => {
        const button = document.createElement('button');

        button.className = 'lesson-btn' + (index === currentLesson ? ' active' : '');
        button.textContent = `${index + 1}`;
        button.title = lesson.title;

        button.onclick = () => selectLesson(index);

        lessonPickerEl.appendChild(button);
      });
    }

    /*
      Выбрать урок по номеру.
      Когда выбираем новый урок, начинаем с первой карточки.
    */
    function selectLesson(index) {
      currentLesson = index;
      currentCard = 0;

      renderLessonButtons();
      loadCard();
    }

    /*
      ==========================================
      ЗАГРУЗКА КАРТОЧКИ
      ==========================================
      Эта функция подставляет слово, перевод, картинку и звук
      из текущей карточки в HTML.
    */
    function loadCard() {
      const card = getCard();

      imageFailed = false;

      progressEl.textContent = `${lessons[currentLesson].title} · ${currentCard + 1}/${getCards().length}`;

      wordEl.textContent = card.word;
      translationEl.textContent = card.ru;

      imageEl.src = card.image;
      imageEl.alt = card.word;

      audioEl.src = card.audio;

      emojiFallbackEl.textContent = card.emoji;

      resetCard();
    }

    /*
      Скрыть слово, перевод, картинку и emoji.
      Используется при переходе к новой карточке.
    */
    function resetCard() {
      wordEl.classList.add('hidden');
      translationEl.classList.add('hidden');
      imageEl.classList.add('hidden');
      emojiFallbackEl.classList.add('hidden');
    }

    /*
      Показать английское слово и русский перевод.
    */
    function showWord() {
      wordEl.classList.remove('hidden');
      translationEl.classList.remove('hidden');
    }

    /*
      Показать картинку.
      Если картинка не загрузилась, показываем emoji.
    */
    function showImage() {
      if (imageFailed) {
        emojiFallbackEl.classList.remove('hidden');
      } else {
        imageEl.classList.remove('hidden');
      }
    }

    /*
      Эта функция автоматически вызывается браузером,
      если файл картинки не найден или не загрузился.
    */
    function showEmojiFallback() {
      imageFailed = true;
      imageEl.classList.add('hidden');
    }

    /*
      Проиграть аудио.

      ВАЖНО:
      Если mp3-файл не найден, приложение попробует использовать
      встроенную озвучку браузера через SpeechSynthesis.
      Это запасной вариант, чтобы карточки не ломались без mp3.
    */
    function playAudio() {
      audioEl.currentTime = 0;

      audioEl.play().catch(() => {
        const utterance = new SpeechSynthesisUtterance(getCard().word);
        utterance.lang = 'en-US';
        utterance.rate = 0.8;
        speechSynthesis.speak(utterance);
      });
    }

    /*
      Перейти к следующей карточке.
      Если карточка последняя, возвращаемся к первой.
    */
    function nextCard() {
      currentCard = (currentCard + 1) % getCards().length;
      loadCard();
    }

    /*
      Перейти к предыдущей карточке.
      Если карточка первая, переходим к последней.
    */
    function prevCard() {
      currentCard = (currentCard - 1 + getCards().length) % getCards().length;
      loadCard();
    }

    /*
      ==========================================
      ГОРЯЧИЕ КЛАВИШИ
      ==========================================

      1 — показать слово
      2 — включить звук
      3 — показать картинку
      0 — скрыть всё
      стрелка вправо — следующая карточка
      стрелка влево — предыдущая карточка
    */
    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight') nextCard();
      if (event.key === 'ArrowLeft') prevCard();
      if (event.key === '1') showWord();
      if (event.key === '2') playAudio();
      if (event.key === '3') showImage();
      if (event.key === '0') resetCard();
    });

    /*
      ==========================================
      ЗАПУСК ПРИЛОЖЕНИЯ
      ==========================================
      Сначала создаём кнопки уроков, потом загружаем первую карточку.
    */
    renderLessonButtons();
    loadCard();
  </script>
</body>
</html>
